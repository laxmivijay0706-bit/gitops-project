apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: git-clone-task
spec:
  params:
  - name: git-url
    type: string
  - name: git-revision
    type: string
    default: "main"
  workspaces:
  - name: output
  steps:
  - name: clone
    image: alpine/git:latest
    script: |
      #!/bin/sh
      echo "=== Cloning repository ==="
      echo "URL: $(params.git-url)"
      echo "Branch: $(params.git-revision)"
      git clone --depth 1 --branch $(params.git-revision) \
        $(params.git-url) $(workspaces.output.path)/source
      echo "=== Clone complete ==="
      ls $(workspaces.output.path)/source
